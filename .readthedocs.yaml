version: 2
build:
  os: ubuntu-24.04
  tools:
    python: "3.14"
  jobs:
    post_create_environment:
      - pip install uv
    install:
      - UV_PROJECT_ENVIRONMENT=$READTHEDOCS_VIRTUALENV_PATH uv sync --all-extras --group docs
    pre_build:
      - sphinx-apidoc -f -o docs wiki
sphinx:
  configuration: docs/conf.py
  fail_on_warning: true
